name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Exercise the supported range (requires-python >= 3.11) and the pinned 3.13.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync environment (CPU JAX + demos extra for the viewer test)
        # Skip the Linux-only `gpu` extra: it pulls ~2-3 GB of CUDA wheels and CI has no GPU.
        run: uv sync --extra demos --python ${{ matrix.python-version }}

      - name: Run tests
        # SDL dummy driver lets the headless pygame viewer test run without a display.
        env:
          SDL_VIDEODRIVER: dummy
        run: uv run pytest
